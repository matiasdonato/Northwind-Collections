services:
  postgres:
    image: postgres:16-alpine
    container_name: northwind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-northwind}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-northwind}
      POSTGRES_DB: ${DATABASE_NAME:-northwind_collections}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-northwind}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
